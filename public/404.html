<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rafal Ciesielski | Redirecting</title>
    <script>
      var redirectPath =
        window.location.pathname + window.location.search + window.location.hash;

      window.location.replace(
        window.location.origin + "/?redirect=" + encodeURIComponent(redirectPath)
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
