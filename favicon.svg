<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">Rafal Ciesielski favicon</title>
  <defs>
    <linearGradient id="bg" x1="96" y1="56" x2="436" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17233a" />
      <stop offset="1" stop-color="#050b16" />
    </linearGradient>
    <linearGradient id="teal" x1="124" y1="132" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4" />
      <stop offset="0.58" stop-color="#2dd4bf" />
      <stop offset="1" stop-color="#0f3f4c" />
